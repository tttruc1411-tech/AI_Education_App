            <path d="M 40 100 L 20 75 L 30 55" /> <path d="M 160 100 L 180 75 L 170 55" />
        </g>
        <g stroke="#1e3a8a" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <path d="M 40 100 L 20 75 L 30 55" /> <path d="M 160 100 L 180 75 L 170 55" />
        </g>
        <path d="M 20 25 L 20 45 M 10 35 L 30 35" stroke="#22c55e" stroke-width="4" stroke-linecap="round" /> <path d="M 170 15 L 170 35 M 160 25 L 180 25" stroke="#22c55e" stroke-width="4" stroke-linecap="round" />
    </g>

    <!-- Outer Shells -->
